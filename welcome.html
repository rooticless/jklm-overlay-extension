<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JKLM Overlay</title>
    <style>
        :root {
            font-family: Arial, sans-serif;
            color: #000;
            background: #fff;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: #fff;
            color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            position: relative;
        }

        .main-text {
            font-size: 20px;
            font-weight: normal;
            text-align: center;
            line-height: 1.4;
        }

        .footer {
            position: absolute;
            bottom: 24px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div class="main-text">Press Alt + H to open or close the panel</div>
    <div class="footer">Made with ♥️ by Root</div>
</body>

</html>
